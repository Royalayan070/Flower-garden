<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person 🌙</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
</head>
<body>

<div class="particles"></div>

<h1 class="title">A Small Garden For My most Valuable and Favorite Person 🌙</h1>

<div class="garden">

    <img src="images/rose.png"
         class="flower"
         onclick="openMessage('rose')">

    <img src="images/tulip.png"
         class="flower"
         onclick="openMessage('tulip')">

    <img src="images/bougainvillea.png"
         class="flower"
         onclick="openMessage('bougainvillea')">

    <img src="images/orchid.png"
         class="flower"
         onclick="openMessage('orchid')">

</div>

<div id="moonContainer">
    <img src="images/moon.png"
         id="moon"
         onclick="showFinalMessage()">
</div>

<div id="popup" class="popup">

    <div class="popup-content">

        <span class="close"
              onclick="closePopup()">
              ×
        </span>

        <h2 id="popupTitle"></h2>

        <p id="popupText"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
