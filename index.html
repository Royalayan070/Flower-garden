<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Small Garden For My Favorite Person 🌙</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
</head>

<body>

    <div class="particles"></div>

    <h1 class="title">
        A Garden Of Things I Wanted To Tell You 🌸
    </h1>

    <p id="progress">
        0 / 5 petals collected 🌸
    </p>

   <div id="moonContainer">

    <img src="images/moon.png"
         id="moon"
         onclick="showFinalMessage()"
         alt="Moon">

    <p class="flower-label">Moonlight</p>

</div>

<div class="garden">

   <div class="flower-wrapper rose">

    <img src="images/rose.png"
         class="flower"
         onclick="openMessage('rose', event)"
         alt="Rose">

    <p class="flower-label">Admiration</p>

</div>

    <div class="flower-wrapper orchid">

        <img src="images/orchid.png"
             class="flower"
             onclick="openMessage('orchid', event)"
             alt="Orchid">

        <p class="flower-label">Inspiration</p>

    </div>

    <div class="flower-wrapper tulip">

        <img src="images/tulip.png"
             class="flower"
             onclick="openMessage('tulip', event)"
             alt="Tulip">

        <p class="flower-label">Gratefulness</p>

    </div>

    <div class="flower-wrapper bougainvillea">

        <img src="images/bougainvillea.png"
             class="flower"
             onclick="openMessage('bougainvillea', event)"
             alt="Bougainvillea">

        <p class="flower-label">Memories</p>

    </div>

    <div class="flower-wrapper strawberry">

        <img src="images/strawberry.png"
             class="flower"
             onclick="openMessage('strawberry', event)"
             alt="Strawberry">

        <p class="flower-label">Apology</p>

    </div>

</div>

    <div id="popup" class="popup">

        <div class="popup-content">

            <span class="close"
                  onclick="closePopup()">
                  ×
            </span>

            <h2 id="popupTitle"></h2>

            <p id="popupText"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
